        as the username and resource-specific API Key Secret as the password.
      scheme: basic
      type: http
    global-api-key:
      description: Authenticate with Global API Keys using HTTP Basic Auth. Treat
        the Global API Key ID as the username and Global API Key Secret as the password.
      scheme: basic
      type: http
    external-access-token:
      description: Authenticate with Confluent API using this credentials (JSON Web
        Tokens) following OAuth 2.0.
      flows:
        clientCredentials:
          scopes: {}
          tokenUrl: https://api.confluent.cloud/sts/v1/oauth2/token
      type: oauth2
