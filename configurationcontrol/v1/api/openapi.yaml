            type: string
          style: simple
  schemas:
    configurationcontrol.v1.Policy:
      description: |
        A `Policy` binds a list of CEL-backed rules to a scope under a registered
        configuration control policy type. The platform compiles the rules at
        create/update time, persists the compiled artifact alongside the source,
        and evaluates the policy at the enforcement points declared by the
        policy type.

        Lifecycle is controlled by `mode`:
          * `DRAFT` — stored only; never evaluated.
          * `AUDIT` — evaluated and surfaced (logs/metrics); not enforced.
          * `ACTIVE` — evaluated and enforced according to `action`.

        The action a policy takes when any of its rules return false is
        controlled by `action`, and must be one the policy type allows:
          * `DENY` — reject the operation.
          * `OVERRIDE` — apply the failing rule's mutation to the resource.
      properties:
        api_version:
          description: APIVersion defines the schema version of this representation
            of a resource.
          enum:
          - configurationcontrol/v1
          readOnly: true
          type: string
        kind:
          description: Kind defines the object this REST resource represents.
          enum:
          - Policy
          readOnly: true
          type: string
        metadata:
          allOf:
          - $ref: '#/components/schemas/ObjectMeta'
          - properties:
              self:
                example: https://api.confluent.cloud/configurationcontrol/v1/policies/payments-cluster-compression
              resource_name:
                example: crn://confluent.cloud/organization=9bb441c4-edef-46ac-8a41-c49e44a3fd9a/configuration-policy=payments-cluster-compression
            type: object
        spec:
          $ref: '#/components/schemas/configurationcontrol.v1.PolicySpec'
        status:
          $ref: '#/components/schemas/configurationcontrol.v1.PolicyStatus'
      type: object
    configurationcontrol.v1.PolicySpec:
      description: The desired state of the Policy.
      properties:
        type:
          description: |
            The policy type that supplies the variable bindings, allowed scope
            kinds, and allowed enforcement actions for this policy. The set of
            available types is registered by Confluent.
          example: CompressionPolicy
          type: string
          x-immutable: true
        scope:
          allOf:
          - $ref: '#/components/schemas/configurationcontrol.v1.PolicyScope'
          description: |
            Where the policy applies. `resource_name` identifies the bound
            entity.
          x-immutable: true
        mode:
          default: DRAFT
          description: |
            Lifecycle position of the policy.
              * `DRAFT` — stored, never evaluated.
              * `AUDIT` — evaluated and surfaced (logs/metrics); not enforced.
              * `ACTIVE` — evaluated and enforced according to `action`.
          example: AUDIT
          type: string
          x-extensible-enum:
          - DRAFT
          - AUDIT
          - ACTIVE
        action:
          description: |
            Action taken when any of the policy's rules return false on an
            `ACTIVE` policy. Must be one the policy type allows.
              * `DENY` — reject the operation.
              * `OVERRIDE` — apply the failing rule's mutation to the resource.
          example: DENY
          type: string
          x-extensible-enum:
          - DENY
          - OVERRIDE
        rules:
          description: |
            The list of CEL rules evaluated for the policy. All rules must
            evaluate true for the policy to pass; the platform AND-joins them at
            compile time.
          items:
            $ref: '#/components/schemas/configurationcontrol.v1.PolicyRule'
          minItems: 1
          type: array
      required:
      - action
      - rules
      - scope
      - type
      type: object
    configurationcontrol.v1.PolicyStatus:
      description: The status of the Policy
      properties:
        phase:
          description: |
            Current lifecycle phase of the policy.
              * `READY` — the policy has been accepted and is being evaluated
                according to `mode`.
              * `FAILED` — the policy is in an unrecoverable error state and is
                not being evaluated. See `error_message` for details.
          example: READY
          readOnly: true
          type: string
          x-extensible-enum:
          - READY
          - FAILED
        error_message:
          description: |
            Displayable error message if the policy is in a `FAILED` state.
          readOnly: true
          type: string
      readOnly: true
      required:
      - phase
      type: object
    configurationcontrol.v1.PolicyScope:
      description: |
        The scope a policy is bound to. The kind of bound resource is inferred
        from the terminal segment of `resource_name` and must be one the
        referenced policy type allows.
      properties:
        resource_name:
          description: The CRN of the bound resource.
          example: crn://confluent.cloud/organization=9bb441c4-edef-46ac-8a41-c49e44a3fd9a/environment=env-456xy/cloud-cluster=lkc-123abc/kafka=lkc-123abc
          type: string
      required:
      - resource_name
    configurationcontrol.v1.PolicyRule:
      description: |
        A single CEL rule. Both `match` and `mutate` are compiled against the
        variable bindings declared by the referenced policy type.
      properties:
        name:
          description: |
            Human-readable label for the rule. Surfaced in errors, audit logs,
            and metrics so operators can identify which rule fired.
          example: cap-compression-to-zstd-or-lz4
          maxLength: 300
          type: string
        match:
          description: |
            CEL expression returning a boolean that describes the required
            configuration. The rule passes when `match` returns true. When
            `match` returns false on a `DENY` policy the operation is rejected;
            on an `OVERRIDE` policy `mutate` is applied.
          example: resource.config["compression.type"] in ["zstd", "lz4"]
          type: string
        mutate:
          description: |
            CEL expression returning the mutation payload to apply when `match`
            returns false under an `OVERRIDE` policy. The output type must match
            a mutable variable binding declared by the policy type. Required on
            `OVERRIDE` policies; must be omitted (or the literal `false`) on
            `DENY` policies.
          example: 'resource.config.merge({"compression.type": "zstd"})'
          type: string
      required:
      - match
      - name
    configurationcontrol.v1.PolicyList:
      description: |
        A `Policy` binds a list of CEL-backed rules to a scope under a registered
        configuration control policy type. The platform compiles the rules at
        create/update time, persists the compiled artifact alongside the source,
        and evaluates the policy at the enforcement points declared by the
        policy type.

        Lifecycle is controlled by `mode`:
          * `DRAFT` — stored only; never evaluated.
          * `AUDIT` — evaluated and surfaced (logs/metrics); not enforced.
          * `ACTIVE` — evaluated and enforced according to `action`.

        The action a policy takes when any of its rules return false is
        controlled by `action`, and must be one the policy type allows:
          * `DENY` — reject the operation.
          * `OVERRIDE` — apply the failing rule's mutation to the resource.
      properties:
        api_version:
          description: APIVersion defines the schema version of this representation
            of a resource.
          enum:
          - configurationcontrol/v1
          readOnly: true
          type: string
        kind:
          description: Kind defines the object this REST resource represents.
          enum:
          - PolicyList
          readOnly: true
          type: string
        metadata:
          allOf:
          - $ref: '#/components/schemas/ListMeta'
          - properties:
              first:
                example: https://api.confluent.cloud/configurationcontrol/v1/policies
              last:
                example: https://api.confluent.cloud/configurationcontrol/v1/policies?page_token=bcAOehAY8F16YD84Z1wT
              prev:
                example: https://api.confluent.cloud/configurationcontrol/v1/policies?page_token=YIXRY97wWYmwzrax4dld
              next:
                example: https://api.confluent.cloud/configurationcontrol/v1/policies?page_token=UvmDWOB1iwfAIBPj6EYb
        data:
          description: A data property that contains an array of resource items. Each
            entry in the array is a separate resource.
          items:
            allOf:
            - $ref: '#/components/schemas/configurationcontrol.v1.Policy'
            - required:
              - metadata
              - spec
              - status
              type: object
          type: array
          uniqueItems: true
      required:
