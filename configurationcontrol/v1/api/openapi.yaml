info:
  contact:
    email: resource-platform@confluent.io
    name: Resource Platform
    url: https://confluent.slack.com/app_redirect?channel=resource-management-eng
  description: |
    Manage configuration control policies that use typed schemas and
    CEL-backed rules to validate, audit, deny, or override supported resource
    and request configuration.

    A `Policy` references a policy type (e.g. `AcksPolicy`, `CompressionPolicy`,
    `NamingPolicy`, `VersionPolicy`) by name. The type is registered by
    Confluent and declares the proto schema, the variable bindings the rules
    can reference, and the set of scope kinds and enforcement actions that are
    allowed for instances of the type.
  title: Configuration Control API
  version: 0.0.1
  x-api-id: ed334993-e62d-455d-837e-30edc1d9c939
  x-api-group: configurationcontrol/v1
  x-audience: external-public
  x-tag-group: Configuration Control (%s)
servers:
- description: Confluent Cloud production
  url: https://api.confluent.cloud
tags:
- description: |-
    [![Early Access](https://img.shields.io/badge/Lifecycle%20Stage-Early%20Access-%2345c6e8)](#section/Versioning/API-Lifecycle-Policy) [![Request Access To Configuration Control API](https://img.shields.io/badge/-Request%20Access%20To%20Configuration%20Control%20API-%23bc8540)](mailto:ccloud-api-access+configurationcontrol-v1-early-access@confluent.io?subject=Request%20to%20join%20configurationcontrol/v1%20API%20Early%20Access&body=I%E2%80%99d%20like%20to%20join%20the%20Confluent%20Cloud%20API%20Early%20Access%20for%20configurationcontrol/v1%20to%20provide%20early%20feedback%21%20My%20Cloud%20Organization%20ID%20is%20%3Cretrieve%20from%20https%3A//confluent.cloud/settings/billing/payment%3E.)

    A `Policy` binds a list of CEL-backed rules to a scope under a registered
    configuration control policy type. The platform compiles the rules at
    create/update time, persists the compiled artifact alongside the source,
    and evaluates the policy at the enforcement points declared by the
    policy type.

    Lifecycle is controlled by `mode`:
      * `DRAFT` — stored only; never evaluated.
      * `AUDIT` — evaluated and surfaced (logs/metrics); not enforced.
      * `ACTIVE` — evaluated and enforced according to `action`.

    The action a policy takes when any of its rules return false is
    controlled by `action`, and must be one the policy type allows:
      * `DENY` — reject the operation.
      * `OVERRIDE` — apply the failing rule's mutation to the resource.


    ## The Policies Model
    <SchemaDefinition schemaRef="#/components/schemas/configurationcontrol.v1.Policy" />
