      - data
      - kind
      - metadata
      type: object
    ObjectMeta:
      description: ObjectMeta is metadata that all persisted resources must have,
        which includes all objects users must create.
      properties:
        self:
          description: Self is a Uniform Resource Locator (URL) at which an object
            can be addressed. This URL encodes the service location, API version,
            and other particulars necessary to locate the resource at a point in time
          example: https://api.confluent.cloud/configurationcontrol/v1/policies/payments-cluster-compression
          format: uri
          readOnly: true
          type: string
        resource_name:
          description: Resource Name is a Uniform Resource Identifier (URI) that is
            globally unique across space and time. It is represented as a Confluent
            Resource Name
          example: crn://confluent.cloud/organization=9bb441c4-edef-46ac-8a41-c49e44a3fd9a/configuration-policy=payments-cluster-compression
          format: uri
          readOnly: true
          type: string
        created_at:
          description: The date and time at which this object was created. It is represented
            in RFC3339 format and is in UTC.
          example: 2006-01-02T15:04:05-07:00
          format: date-time
          readOnly: true
          type: string
        updated_at:
          description: The date and time at which this object was last updated. It
            is represented in RFC3339 format and is in UTC.
          example: 2006-01-02T15:04:05-07:00
          format: date-time
          readOnly: true
          type: string
        deleted_at:
          description: The date and time at which this object was (or will be) deleted.
            It is represented in RFC3339 format and is in UTC.
          example: 2006-01-02T15:04:05-07:00
          format: date-time
          readOnly: true
          type: string
        name:
          description: |
            Client-supplied stable identifier for the policy. Used as
            the URL identifier and must be unique within the caller's
            organization. Immutable.
          example: payments-cluster-compression
          maxLength: 300
          pattern: ^[a-zA-Z0-9_][a-zA-Z0-9\-_.$]*$
          type: string
          x-immutable: true
        uid:
          description: |
            System-generated unique identifier for this policy.
            Distinct from `name`: while `name` is the client-supplied
            URL identifier, `uid` remains unique across time even if a
            policy with the same `name` is deleted and recreated.
          example: 7c4a0e83-2b4a-4d8a-9e2d-6f1f0b6f3f9c
          readOnly: true
          type: string
          x-immutable: true
        resource_version:
          description: Opaque value identifying the current version of the policy.
          example: "2"
          readOnly: true
          type: string
